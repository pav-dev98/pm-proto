syntax = "proto3";

package auth;

option go_package = "github.com/pav-dev98/pm-proto/proto/auth";

// El servicio Auth
service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
}

// Request: lo que el gateway envía al Auth service
message LoginRequest {
  string email    = 1;
  string password = 2;
}

// Response: lo que el Auth service devuelve al gateway
message LoginResponse {
  string access_token  = 1;
  string refresh_token = 2;
  string token_type    = 3; // "Bearer"
}